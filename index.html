<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chair Booking Site</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chair Booking</h1>
        <p>Reserve your spot in the ultimate comfort zone.</p>
        <button id="bookBtn">Book chair slot</button>
    </div>
    <div id="popup" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <p>The chair has been booked for the foreseeable by Jack. Apologies for any inconvenience.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
